name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (for example, 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install stable Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: Validate release input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          if [ "$GITHUB_REF" != refs/heads/main ]; then
            echo "Releases must be dispatched from main" >&2
            exit 1
          fi
          if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must use MAJOR.MINOR.PATCH format" >&2
            exit 1
          fi
      - name: Validate and package
        env:
          VERSION: ${{ inputs.version }}
        run: ./tools/release-check.sh "rust-v$VERSION"
      - name: Create annotated version tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          tag="rust-v$VERSION"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            test "$(git cat-file -t "refs/tags/$tag")" = tag
            test "$(git rev-list -n 1 "$tag")" = "$GITHUB_SHA"
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git tag -a "$tag" -m "fdk-aac Rust port $VERSION"
            git push origin "refs/tags/$tag"
          fi
      - name: Publish crates.io packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: ./tools/publish-crates.sh "$VERSION"
      - name: Create source archive and checksums
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          archive="fdk-aac-rust-$VERSION.tar.gz"
          sys_crate="fdk-aac-rust-sys-$VERSION.crate"
          rust_crate="fdk-aac-rust-$VERSION.crate"
          git archive --format=tar.gz \
            --prefix="fdk-aac-rust-$VERSION/" \
            --output="$archive" HEAD
          ./tools/verify-license-files.sh "$archive"
          ./tools/verify-license-files.sh "$sys_crate"
          ./tools/verify-license-files.sh "$rust_crate"
          sha256sum "$archive" "$sys_crate" "$rust_crate" > SHA256SUMS
      - name: Extract release notes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          awk -v heading="## $VERSION - " '
            index($0, heading) == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          test -s RELEASE_NOTES.md
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          tag="rust-v$VERSION"
          archive="fdk-aac-rust-$VERSION.tar.gz"
          sys_crate="fdk-aac-rust-sys-$VERSION.crate"
          rust_crate="fdk-aac-rust-$VERSION.crate"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "$archive" "$sys_crate" "$rust_crate" SHA256SUMS --clobber
          else
            gh release create "$tag" \
              "$archive" "$sys_crate" "$rust_crate" SHA256SUMS \
              --verify-tag \
              --title "fdk-aac Rust port $VERSION" \
              --notes-file RELEASE_NOTES.md
          fi
