name: Release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**/Cargo.toml"
      - "crates/fdk-aac-sys/build.rs"
      - "tools/release-check.sh"
      - "tools/publish-crates.sh"
      - "tools/check-release-order.sh"
      - "tools/verify-published-crates.sh"
      - "tools/verify-published-release.sh"
      - "tools/create-or-verify-release.sh"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (for example, 0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-validation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install stable Rust and SBOM generator
        run: |
          rustup update stable --no-self-update
          rustup default stable
          cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Validate offline docs.rs builds
        run: |
          DOCS_RS=1 cargo doc -p fdk-aac-rust-sys --no-deps --locked
          DOCS_RS=1 cargo doc -p fdk-aac-rust --no-default-features --no-deps --locked
      - name: Validate release verifier and SBOM generation
        run: |
          sh -n tools/verify-published-release.sh
          sh -n tools/verify-published-crates.sh
          sh -n tools/create-or-verify-release.sh
          ./tools/check-release-order.sh
          cargo cyclonedx --format json --all --target all --spec-version 1.5
          test -s crates/fdk-aac-sys/fdk-aac-rust-sys.cdx.json
          test -s crates/fdk-aac/fdk-aac-rust.cdx.json

  github-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install stable Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: Install SBOM generator
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Validate release input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          if [ "$GITHUB_REF" != refs/heads/main ]; then
            echo "Releases must be dispatched from main" >&2
            exit 1
          fi
          if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must use MAJOR.MINOR.PATCH format" >&2
            exit 1
          fi
      - name: Validate and package
        env:
          VERSION: ${{ inputs.version }}
        run: ./tools/release-check.sh "rust-v$VERSION"
      - name: Publish crates.io packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: ./tools/publish-crates.sh "$VERSION"
      - name: Verify canonical crates before creating Git references
        env:
          VERSION: ${{ inputs.version }}
        run: ./tools/verify-published-crates.sh "$VERSION" "$GITHUB_SHA"
      - name: Create source archive
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          archive="fdk-aac-rust-$VERSION.tar.gz"
          sys_crate="fdk-aac-rust-sys-$VERSION.crate"
          rust_crate="fdk-aac-rust-$VERSION.crate"
          git archive --format=tar.gz \
            --prefix="fdk-aac-rust-$VERSION/" \
            --output="$archive" HEAD
          ./tools/verify-license-files.sh "$archive"
          ./tools/verify-license-files.sh "$sys_crate"
          ./tools/verify-license-files.sh "$rust_crate"
      - name: Generate CycloneDX SBOMs
        run: |
          set -eu
          cargo cyclonedx --format json --all --target all --spec-version 1.5
          mv crates/fdk-aac-sys/fdk-aac-rust-sys.cdx.json .
          mv crates/fdk-aac/fdk-aac-rust.cdx.json .
          test -s fdk-aac-rust-sys.cdx.json
          test -s fdk-aac-rust.cdx.json
      - name: Create and verify SHA-256 manifest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          sha256sum \
            "fdk-aac-rust-$VERSION.tar.gz" \
            "fdk-aac-rust-sys-$VERSION.crate" \
            "fdk-aac-rust-$VERSION.crate" \
            fdk-aac-rust-sys.cdx.json \
            fdk-aac-rust.cdx.json > SHA256SUMS
          sha256sum --check --strict SHA256SUMS
      - name: Attest release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: SHA256SUMS
      - name: Extract release notes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          awk -v heading="## $VERSION - " '
            index($0, heading) == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          test -s RELEASE_NOTES.md
      - name: Create annotated version tag after registry publication
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          tag="rust-v$VERSION"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            test "$(git cat-file -t "refs/tags/$tag")" = tag
            test "$(git rev-list -n 1 "$tag")" = "$GITHUB_SHA"
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git tag -a "$tag" -m "fdk-aac Rust port $VERSION"
            git push origin "refs/tags/$tag"
          fi
      - name: Create or verify immutable-ready GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: ./tools/create-or-verify-release.sh "$VERSION" "$GITHUB_SHA"
      - name: Verify published commit and service availability
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: ./tools/verify-published-release.sh "$VERSION" "$GITHUB_SHA"
