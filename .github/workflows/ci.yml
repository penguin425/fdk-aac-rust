name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  compatibility:
    name: MSRV, SemVer, and sys ABI
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Test minimum supported Rust version
        run: |
          rustup toolchain install 1.87.0 --profile minimal --no-self-update
          CARGO_TARGET_DIR=target/msrv rustup run 1.87.0 cargo test -p fdk-aac-rust --no-default-features --locked
      - name: Check public API compatibility with 0.2.1
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
        with:
          package: fdk-aac-rust,fdk-aac-rust-sys
          baseline-version: 0.2.1
      - name: Check sys ABI declaration snapshot
        run: ./tools/check-sys-abi.sh

  pure-rust:
    name: pure-rust (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: windows-msvc
            os: windows-2025
            target: x86_64-pc-windows-msvc
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: linux-musl
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            musl: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install stable Rust target
        run: rustup update stable --no-self-update && rustup default stable && rustup target add ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.musl == true
        run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - name: Test Pure Rust implementation
        run: cargo test -p fdk-aac-rust --no-default-features --locked --target ${{ matrix.target }}

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install stable Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check workspace
        run: cargo check --workspace --all-targets --locked
      - name: Test differential workspace
        run: cargo test --workspace --locked
